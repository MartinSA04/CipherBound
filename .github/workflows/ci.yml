name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  docs:
    name: Docs Validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install documentation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz

      - name: Generate and validate docs
        run: ./tests/check_docs.sh

  native:
    name: Native Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            doxygen \
            graphviz \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            pkg-config \
            cmake

      - name: Configure native build
        run: meson setup build

      - name: Compile native build
        run: meson compile -C build

      - name: Run test suite
        run: meson test -C build --print-errorlogs

  windows-native:
    name: Windows Build And Test
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      - name: Install Windows build dependencies
        shell: msys2 {0}
        run: |
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-meson \
            mingw-w64-x86_64-ninja \
            mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-pkgconf \
            mingw-w64-x86_64-SDL2 \
            mingw-w64-x86_64-SDL2_image \
            mingw-w64-x86_64-SDL2_mixer

      - name: Configure Windows build
        shell: msys2 {0}
        run: meson setup build

      - name: Compile Windows build
        shell: msys2 {0}
        run: meson compile -C build

      - name: Run Windows test suite
        shell: msys2 {0}
        run: meson test -C build --print-errorlogs

  web:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install web build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            curl \
            git

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Build web target
        run: |
          source emsdk/emsdk_env.sh
          ./build_web.sh

      - name: Verify web build output
        run: |
          test -f buildw/deploy/index.html
          test -f buildw/deploy/robots.txt
          test -f buildw/deploy/sitemap.xml
          ls -lah buildw/deploy
