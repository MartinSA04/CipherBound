name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  native:
    name: Native Build And Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            pkg-config \
            cmake

      - name: Configure native build
        run: meson setup build

      - name: Compile native build
        run: meson compile -C build

      - name: Run test suite
        run: meson test -C build --print-errorlogs

  web:
    name: Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install web build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            python3 \
            curl \
            git

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Build web target
        run: |
          source emsdk/emsdk_env.sh
          chmod +x ./build_web.sh
          ./build_web.sh

      - name: Verify web build output
        run: |
          test -f buildw/deploy/index.html
          ls -lah buildw/deploy
