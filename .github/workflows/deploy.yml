name: Deploy CipherBound

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PAGES_PROJECT_NAME: cipherbound
      R2_BUCKET: cipherbound-assets
      R2_PUBLIC_BASE: https://assets.cipherbound.com

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute deployment version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          build_version="web.${GITHUB_RUN_NUMBER}.${short_sha}"
          deploy_tag="deploy-${GITHUB_RUN_NUMBER}-${short_sha}"
          build_timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "build_version=$build_version"
            echo "deploy_tag=$deploy_tag"
            echo "build_timestamp=$build_timestamp"
            echo "short_sha=$short_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build python3 curl git jq

      - name: Install Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Build web version
        run: |
          source emsdk/emsdk_env.sh
          chmod +x ./scripts/build_web.sh
          SITE_URL=https://cipherbound.com/ \
          BUILD_VERSION='${{ steps.version.outputs.build_version }}' \
          BUILD_COMMIT_SHA='${{ github.sha }}' \
          BUILD_COMMIT_SHORT='${{ steps.version.outputs.short_sha }}' \
          BUILD_TIMESTAMP='${{ steps.version.outputs.build_timestamp }}' \
          BUILD_REF_NAME='${{ github.ref_name }}' \
          ./scripts/build_web.sh

      - name: Rewrite asset base for production
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path("buildw/deploy/index.html")
          text = p.read_text(encoding="utf-8")
          old = "window.ASSET_BASE = window.ASSET_BASE || '';"
          new = "window.ASSET_BASE = 'https://assets.cipherbound.com';"
          if old not in text:
              raise SystemExit("ASSET_BASE marker not found in index.html")
          text = text.replace(old, new, 1)
          p.write_text(text, encoding="utf-8")
          PY

      - name: Show deploy output
        run: ls -lah buildw/deploy

      - name: Verify SEO deploy artifacts
        run: |
          test -f buildw/deploy/build_version.json
          test -f buildw/deploy/robots.txt
          test -f buildw/deploy/sitemap.xml
          grep -q 'https://cipherbound.com/' buildw/deploy/index.html
          jq -e '.version == "${{ steps.version.outputs.build_version }}"' buildw/deploy/build_version.json
          grep -q '${{ steps.version.outputs.build_version }}' buildw/deploy/index.html

      - name: Upload hashed .data file(s) to R2
        run: |
          shopt -s nullglob
          data_files=(buildw/deploy/index.*.data)

          if [ ${#data_files[@]} -eq 0 ]; then
            echo "No hashed .data file found in buildw/deploy/"
            exit 1
          fi

          for f in "${data_files[@]}"; do
            name="$(basename "$f")"
            echo "Uploading $name to R2 bucket $R2_BUCKET"
            wrangler r2 object put "$R2_BUCKET/$name" --file="$f" --remote
          done

      - name: Remove .data files from Pages upload directory
        run: rm -f buildw/deploy/*.data

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy buildw/deploy --project-name "$PAGES_PROJECT_NAME"

      - name: Create deployment tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.deploy_tag }}" "${{ github.sha }}"
          git push origin "${{ steps.version.outputs.deploy_tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.deploy_tag }}" \
            --title "Deploy ${{ steps.version.outputs.build_version }}" \
            --notes "$(cat <<EOF
          Cloudflare deployment metadata

          Version: ${{ steps.version.outputs.build_version }}
          Tag: ${{ steps.version.outputs.deploy_tag }}
          Commit: ${{ github.sha }}
          Ref: ${{ github.ref_name }}
          Built: ${{ steps.version.outputs.build_timestamp }}
          Site: https://cipherbound.com/
          EOF
          )"
