<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéGame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      touch-action: none;
    }

    #canvas-wrapper {
      border: 3px solid #444;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
      /* wrapper dimensions are set by JS to match the scaled size */
    }

    #canvas-container {
      position: relative;
      overflow: hidden;
      transform-origin: 0 0;
      width: 1024px;
      height: 768px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Fullscreen: black background, canvas centered */
    #canvas-wrapper:fullscreen {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background: #2d2d4e;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    button:hover { background: #3d3d6e; }

    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
    }

    #loading.hidden { display: none; }

    #audio-unlock {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.72);
      z-index: 30;
    }
    #audio-unlock.hidden { display: none; }
    #audio-unlock-btn {
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
    }

    #status {
      margin-bottom: 12px;
      font-size: 16px;
    }

    progress {
      width: 240px;
      height: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    progress::-webkit-progress-bar { background: #333; border-radius: 6px; }
    progress::-webkit-progress-value { background: #5b7fff; border-radius: 6px; }
    progress::-moz-progress-bar { background: #5b7fff; border-radius: 6px; }

    /* ── Mobile touch controls ── */
    #game-layout {
      display: contents;
    }
    .touch-side {
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* D-Pad */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }
    .dpad-btn {
      width: 52px;
      height: 52px;
      border-radius: 10px;
      background: #2d2d4e;
      border: 2px solid #555;
      color: #ccc;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .dpad-btn:active, .dpad-btn.pressed { background: #5b7fff; border-color: #7b9fff; }
    .dpad-blank { visibility: hidden; }

    /* Action buttons */
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .action-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #2d2d4e;
      border: 2px solid #555;
      color: #e0e0e0;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .action-btn:active, .action-btn.pressed { background: #5b7fff; border-color: #7b9fff; }
    .action-btn.btn-a { background: #2e5e2e; border-color: #4a8; }
    .action-btn.btn-a:active, .action-btn.btn-a.pressed { background: #4a8; }
    .action-btn.btn-b { background: #6e2e2e; border-color: #a44; }
    .action-btn.btn-b:active, .action-btn.btn-b.pressed { background: #a44; }

    .small-buttons {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .small-btn {
      height: 32px;
      padding: 0 14px;
      border-radius: 16px;
      background: #333;
      border: 1px solid #555;
      color: #bbb;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .small-btn:active, .small-btn.pressed { background: #5b7fff; }

    /* ── Portrait mobile ── */
    @media (max-width: 768px) and (orientation: portrait) {
      body {
        justify-content: center;
        padding-top: 0;
      }
      #game-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      #canvas-wrapper {
        border-width: 2px;
        border-radius: 4px;
      }
      #touch-portrait-row {
        display: flex;
        width: 100%;
        justify-content: space-between;
        padding: 10px 12px 16px;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #touch-portrait-row .touch-side {
        display: flex;
      }
      /* Hide standalone touch-sides outside portrait row */
      #controls { display: none; }
    }

    /* ── Landscape mobile ── */
    @media (orientation: landscape) and (max-height: 500px) {
      body {
        justify-content: center;
        overflow: hidden;
      }
      #game-layout {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh;
        gap: 4px;
      }
      /* In landscape, break portrait-row into side-by-side panels */
      #touch-portrait-row {
        display: contents;
      }
      #canvas-wrapper {
        order: 2;
        border-width: 2px;
        border-radius: 4px;
        flex-shrink: 0;
      }
      #touch-left {
        order: 1;
      }
      #touch-right {
        order: 3;
      }
      .touch-side {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        padding: 4px;
      }
      #controls { display: none; }
      .dpad { grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(3, 44px); gap: 3px; }
      .dpad-btn { width: 44px; height: 44px; font-size: 18px; }
      .action-btn { width: 48px; height: 48px; font-size: 14px; }
      .small-btn { height: 28px; padding: 0 10px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="game-layout">
    <div id="canvas-wrapper">
      <div id="canvas-container">
        <div id="loading">
          <div id="status">Loading...</div>
          <progress id="progress" value="0" max="100"></progress>
        </div>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
      </div>
    </div>
    <!-- Wrapper for portrait: D-pad left, actions right, below canvas -->
    <div id="touch-portrait-row">
      <div id="touch-left" class="touch-side">
        <div class="dpad">
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowUp" data-code="ArrowUp">▲</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowLeft" data-code="ArrowLeft">◀</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowRight" data-code="ArrowRight">▶</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowDown" data-code="ArrowDown">▼</button>
          <div class="dpad-blank"></div>
        </div>
      </div>
      <div id="touch-right" class="touch-side">
        <div class="action-buttons">
          <div class="action-row">
            <button class="action-btn btn-b" data-key="x" data-code="KeyX">B</button>
            <button class="action-btn btn-a" data-key="z" data-code="KeyZ">A</button>
          </div>
          <div class="small-buttons">
            <button class="small-btn" data-key="Shift" data-code="ShiftLeft">Run</button>
            <button class="small-btn" data-key="c" data-code="KeyC">Menu</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="audio-unlock">
    <button id="audio-unlock-btn" type="button">Tap to enable audio</button>
  </div>

  <div id="controls">
    <button id="fullscreen-btn">Fullscreen</button>
  </div>

  <script>
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var loadingElement = document.getElementById('loading');
    var canvasElement = document.getElementById('canvas');
    var containerElement = document.getElementById('canvas-container');
    var wrapperElement = document.getElementById('canvas-wrapper');
    var audioUnlockElement = document.getElementById('audio-unlock');
    var audioUnlockButton = document.getElementById('audio-unlock-btn');

    canvasElement.addEventListener('webglcontextlost', function(e) {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    document.getElementById('fullscreen-btn').addEventListener('click', function() {
      if (wrapperElement.requestFullscreen) wrapperElement.requestFullscreen();
      else if (wrapperElement.webkitRequestFullscreen) wrapperElement.webkitRequestFullscreen();
    });



    var setStatus = function(text) {
      if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
      if (text === setStatus.last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - setStatus.last.time < 30) return;
      setStatus.last.time = now;
      setStatus.last.text = text;
      if (m) {
        statusElement.textContent = m[1];
        progressElement.value = parseInt(m[2]) * 100;
        progressElement.max = parseInt(m[4]) * 100;
      } else {
        if (!text) {
          loadingElement.classList.add('hidden');
        }
        statusElement.textContent = text;
      }
    };

    var Module = {
      print: function() {
        var args = Array.prototype.slice.call(arguments);
        console.log.apply(console, args);
      },
      printErr: function() {
        var args = Array.prototype.slice.call(arguments);
        console.warn.apply(console, args);
      },
      canvas: canvasElement,
      setStatus: setStatus,
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      preRun: [function() {
        // Mount IDBFS on /saves so save files persist across reloads
        FS.mkdir('/saves');
        FS.mount(IDBFS, {}, '/saves');
        // Block game startup until IndexedDB data is loaded
        Module.addRunDependency('idbfs-load');
        FS.syncfs(true, function(err) {
          if (err) console.warn('IDBFS load error:', err);
          else console.log('Save data loaded from IndexedDB');
          Module.removeRunDependency('idbfs-load');
        });
      }]
    };

    // Periodically sync /saves to IndexedDB (catches writes from C++)
    // Also sync on page unload as a safety net
    (function() {
      var syncPending = false;
      function syncSaves() {
        if (syncPending) return;
        if (typeof FS === 'undefined' || !FS.syncfs) return;
        syncPending = true;
        FS.syncfs(false, function(err) {
          syncPending = false;
          if (err) console.warn('IDBFS sync error:', err);
        });
      }
      // Sync every 2 seconds while the game runs
      setInterval(syncSaves, 2000);
      // Also sync on visibility change (user switches tabs / closes)
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') syncSaves();
      });
      window.addEventListener('beforeunload', syncSaves);
    })();

    setStatus('Downloading...');
    window.onerror = function(event) {
      setStatus('Exception thrown, see JavaScript console');
      setStatus = function(text) {
        if (text) console.error('[post-exception status] ' + text);
      };
    };

    /* ── Audio unlock (mobile autoplay policy) ── */
    (function() {
      var audioUnlocked = false;

      function getAudioContexts() {
        var contexts = [];
        if (typeof Module !== 'undefined' && Module && Module.SDL2 && Module.SDL2.audioContext) {
          contexts.push(Module.SDL2.audioContext);
        }
        if (typeof window !== 'undefined' && window.SDL2 && window.SDL2.audioContext) {
          contexts.push(window.SDL2.audioContext);
        }
        return contexts;
      }

      function updateOverlay() {
        var contexts = getAudioContexts();
        var running = contexts.length > 0 && contexts.every(function(ctx) { return ctx && ctx.state === 'running'; });

        if (running) {
          audioUnlocked = true;
          audioUnlockElement.classList.add('hidden');
        } else {
          audioUnlockElement.classList.remove('hidden');
        }
      }

      function tryUnlockAudio() {
        if (audioUnlocked) return;

        var contexts = getAudioContexts();
        if (contexts.length === 0) {
          updateOverlay();
          return;
        }

        contexts.forEach(function(ctx) {
          if (ctx && typeof ctx.resume === 'function' && ctx.state !== 'running') {
            ctx.resume().catch(function() {});
          }
        });

        // Allow state transitions to settle
        setTimeout(updateOverlay, 50);
      }

      window.tryUnlockGameAudio = tryUnlockAudio;

      audioUnlockButton.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        tryUnlockAudio();
      });
      document.addEventListener('pointerdown', tryUnlockAudio, { passive: true });
      document.addEventListener('keydown', tryUnlockAudio, { passive: true });

      // Poll briefly in case SDL creates audio context after startup
      var checks = 0;
      var interval = setInterval(function() {
        updateOverlay();
        if (audioUnlocked || ++checks > 120) clearInterval(interval);
      }, 250);
    })();

    /* ── Touch controls → keyboard events ── */
    (function() {
      var touchPanels = [document.getElementById('touch-portrait-row')];
      var allBtns = Array.prototype.slice.call(document.querySelectorAll('.touch-side [data-key]'));
      var activeMap = {};   // touchId -> pressed button element
      var trackedTouches = {};  // touchId -> true, for all touches that started on us

      function sendKey(type, key, code) {
        canvasElement.dispatchEvent(new KeyboardEvent(type, {
          key: key,
          code: code,
          keyCode: keyCodeFor(key),
          which: keyCodeFor(key),
          bubbles: true,
          cancelable: true
        }));
      }

      function keyCodeFor(key) {
        var map = {
          'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
          'z': 90, 'x': 88, 'c': 67, 'Shift': 16
        };
        return map[key] || 0;
      }

      function pressButton(touchId, btn) {
        var cur = activeMap[touchId] || null;
        if (cur === btn) return;
        if (cur) {
          cur.classList.remove('pressed');
          sendKey('keyup', cur.dataset.key, cur.dataset.code);
        }
        if (btn) {
          activeMap[touchId] = btn;
          btn.classList.add('pressed');
          sendKey('keydown', btn.dataset.key, btn.dataset.code);
        } else {
          delete activeMap[touchId];
        }
      }

      function buttonAtPoint(x, y) {
        for (var i = 0; i < allBtns.length; i++) {
          var r = allBtns[i].getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
            return allBtns[i];
          }
        }
        return null;
      }

      function onTouchStart(e) {
        e.preventDefault();
        if (window.tryUnlockGameAudio) window.tryUnlockGameAudio();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          trackedTouches[t.identifier] = true;
          pressButton(t.identifier, buttonAtPoint(t.clientX, t.clientY));
        }
      }
      function onTouchMove(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          if (t.identifier in trackedTouches) {
            pressButton(t.identifier, buttonAtPoint(t.clientX, t.clientY));
          }
        }
      }
      function onTouchEnd(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var id = e.changedTouches[i].identifier;
          pressButton(id, null);
          delete trackedTouches[id];
        }
      }
      function onTouchCancel(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          var id = e.changedTouches[i].identifier;
          pressButton(id, null);
          delete trackedTouches[id];
        }
      }

      touchPanels.forEach(function(panel) {
        panel.addEventListener('touchstart', onTouchStart, { passive: false });
        panel.addEventListener('touchmove', onTouchMove, { passive: false });
        panel.addEventListener('touchend', onTouchEnd, { passive: false });
        panel.addEventListener('touchcancel', onTouchCancel);
        panel.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      });
    })();

    /* ── Responsive canvas sizing ── */
    (function() {
      var NW = 1024, NH = 768, PIXEL_SCALE = 4;

      function applyScale() {
        if (canvasElement.width < 2 || canvasElement.height < 2) return;

        var wrapperStyles = window.getComputedStyle(wrapperElement);
        var borderX = (parseFloat(wrapperStyles.borderLeftWidth) || 0) + (parseFloat(wrapperStyles.borderRightWidth) || 0);
        var borderY = (parseFloat(wrapperStyles.borderTopWidth) || 0) + (parseFloat(wrapperStyles.borderBottomWidth) || 0);

        var isLandscapeMobile = (window.innerWidth > window.innerHeight) && window.innerHeight <= 500;
        var isPortraitMobile = window.innerWidth <= 768 && !isLandscapeMobile;
        var cssScale;

        if (isLandscapeMobile) {
          // Landscape: canvas between side panels, fit to height
          // D-pad: 3×44 + 2×3 gap + 2×4 pad = 148px; Actions: 2×48+12 gap + 2×4 pad = 124px
          var sideW = 148 + 124 + 8; // two panels + gaps
          var scaleW = (window.innerWidth - sideW - borderX) / NW;
          var scaleH = (window.innerHeight - 8 - borderY) / NH;
          cssScale = Math.min(scaleW, scaleH);
          if (cssScale < 0.1) cssScale = 0.1;
        } else if (isPortraitMobile) {
          // Portrait: fill width, but leave room for controls below (~180px)
          var controlsH = 180;
          var scaleByW = (window.innerWidth - 16 - borderX) / NW;
          var scaleByH = (window.innerHeight - controlsH - borderY - 16) / NH;
          cssScale = Math.min(scaleByW, scaleByH);
          if (cssScale < 0.1) cssScale = 0.1;
        } else {
          // Desktop: perfect-pixel steps, capped by height
          var maxW = Math.min(NW * 2, window.innerWidth * 0.9);
          var maxH = window.innerHeight * 0.85 - 50;
          var stepPx = NW / PIXEL_SCALE;
          var steps = Math.floor(maxW / stepPx);
          if (steps < 1) steps = 1;
          cssScale = steps / PIXEL_SCALE;
          while (NH * cssScale > maxH && cssScale > 1 / PIXEL_SCALE) {
            steps--;
            cssScale = Math.max(steps, 1) / PIXEL_SCALE;
          }
        }

        containerElement.style.transform = 'scale(' + cssScale + ')';
        wrapperElement.style.width = Math.floor(NW * cssScale + borderX) + 'px';
        wrapperElement.style.height = Math.floor(NH * cssScale + borderY) + 'px';
      }

      window.addEventListener('resize', applyScale);
      window.addEventListener('orientationchange', function() { setTimeout(applyScale, 200); });

      // Poll until canvas is ready, then keep re-applying for a bit
      // to catch Emscripten's late canvas init
      var settled = 0;
      (function poll() {
        if (canvasElement.width >= 2 && canvasElement.height >= 2) {
          applyScale();
          settled++;
          if (settled < 10) setTimeout(poll, 100);
        } else {
          requestAnimationFrame(poll);
        }
      })();
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
