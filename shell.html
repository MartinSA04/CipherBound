<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!--
    Viewport meta:
    - width=device-width: correct sizing on all phones
    - initial-scale=1.0: no zoom on load
    - maximum-scale=1.0, user-scalable=no: prevent pinch-to-zoom which
      interferes with touch controls (iOS ≤16, Android Chrome)
    - viewport-fit=cover: extend content under iOS notch / safe area
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <!-- Prevent iOS auto-detecting phone numbers, emails, etc. -->
  <meta name="format-detection" content="telephone=no">
  <!-- PWA hints for Add-to-Home-Screen -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <!-- Suppress favicon 404 -->
  <link rel="icon" href="data:,">
  <title>CipherBound</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      overscroll-behavior: none;        /* Chrome/Edge: prevent pull-to-refresh */
      -webkit-overflow-scrolling: auto; /* iOS: disable momentum scrolling */
    }

    html {
      /* dvh accounts for mobile browser toolbar show/hide.
         Falls back to vh on older browsers (CSS ignores unknown units). */
      height: 100vh;
      height: 100dvh;
    }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e0e0e0;
      touch-action: none;              /* Prevent all default touch behaviors */
      -webkit-touch-callout: none;     /* iOS: prevent long-press callout */
      -webkit-user-select: none;
      user-select: none;
      /* Safe-area padding for notched iPhones */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ── Canvas wrapper & container ── */
    #canvas-wrapper {
      position: relative;
      border: 3px solid #444;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }

    #canvas-container {
      position: relative;
      overflow: hidden;
      transform-origin: 0 0;
      width: 1024px;
      height: 768px;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      -webkit-touch-callout: none;
    }

    /* ── Fullscreen icon button ── */
    #fs-toggle {
      position: fixed;
      top: 8px;
      right: 8px;
      top: max(8px, env(safe-area-inset-top));
      right: max(8px, env(safe-area-inset-right));
      z-index: 50;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      color: #ddd;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      touch-action: manipulation;
    }
    #fs-toggle:hover { opacity: 1; }
    #fs-toggle:active { opacity: 1; background: rgba(91,127,255,0.6); }
    #fs-toggle svg { width: 20px; height: 20px; fill: currentColor; pointer-events: none; }

    /* ── Loading overlay ── */
    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
    }
    #loading.hidden { display: none; }
    #status { margin-bottom: 12px; font-size: 16px; }

    progress {
      width: 240px;
      height: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    progress::-webkit-progress-bar { background: #333; border-radius: 6px; }
    progress::-webkit-progress-value { background: #5b7fff; border-radius: 6px; }
    progress::-moz-progress-bar { background: #5b7fff; border-radius: 6px; }

    /* ── Audio unlock overlay ── */
    #audio-unlock {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.72);
      z-index: 30;
      touch-action: manipulation;
    }
    #audio-unlock.hidden { display: none; }
    #audio-unlock-btn {
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 600;
      border-radius: 10px;
      background: #2d2d4e;
      color: #e0e0e0;
      border: 2px solid #5b7fff;
      cursor: pointer;
      min-width: 200px;
      min-height: 48px;     /* Apple HIG minimum tap target */
      touch-action: manipulation;
    }

    /* ── Base button styles ── */
    button {
      background: #2d2d4e;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
      touch-action: manipulation;      /* Eliminate 300ms tap delay */
    }
    button:hover { background: #3d3d6e; }

    /* ── Layout wrapper ── */
    #game-layout { display: contents; }

    /* ── Touch control panels ── */
    .touch-side {
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    /* D-Pad grid */
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(3, 52px);
      gap: 4px;
    }
    .dpad-btn {
      width: 52px; height: 52px;
      border-radius: 10px;
      background: #2d2d4e;
      border: 2px solid #555;
      color: #ccc;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    .dpad-btn:active, .dpad-btn.pressed { background: #5b7fff; border-color: #7b9fff; }
    .dpad-blank { visibility: hidden; }

    /* Action buttons */
    .action-buttons { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .action-row { display: flex; gap: 12px; align-items: center; }
    .action-btn {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: #2d2d4e;
      border: 2px solid #555;
      color: #e0e0e0;
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    .action-btn:active, .action-btn.pressed { background: #5b7fff; border-color: #7b9fff; }
    .action-btn.btn-a { background: #2e5e2e; border-color: #4a8; }
    .action-btn.btn-a:active, .action-btn.btn-a.pressed { background: #4a8; }
    .action-btn.btn-b { background: #6e2e2e; border-color: #a44; }
    .action-btn.btn-b:active, .action-btn.btn-b.pressed { background: #a44; }

    .small-buttons { display: flex; gap: 8px; margin-top: 4px; }
    .small-btn {
      height: 32px; padding: 0 14px;
      border-radius: 16px;
      background: #333;
      border: 1px solid #555;
      color: #bbb;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      touch-action: none;
      -webkit-touch-callout: none;
    }
    .small-btn:active, .small-btn.pressed { background: #5b7fff; }

    /* ═══════════════════════════════════
       PORTRAIT MOBILE
       ═══════════════════════════════════ */
    @media (max-width: 768px) and (orientation: portrait) {
      body { justify-content: center; }
      #game-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }
      #canvas-wrapper { border-width: 2px; border-radius: 4px; }
      #touch-portrait-row {
        display: flex;
        width: 100%;
        justify-content: space-between;
        padding: 10px 12px 16px;
        padding-bottom: max(16px, env(safe-area-inset-bottom));
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #touch-portrait-row .touch-side { display: flex; }
    }

    /* ═══════════════════════════════════
       LANDSCAPE MOBILE
       ═══════════════════════════════════ */
    @media (orientation: landscape) and (max-height: 500px) {
      body { justify-content: center; }
      #game-layout {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100vh; height: 100dvh;
        gap: 4px;
      }
      #touch-portrait-row { display: contents; }
      #canvas-wrapper {
        order: 2;
        border-width: 2px; border-radius: 4px;
        flex-shrink: 0;
      }
      #touch-left {
        order: 1;
        padding-left: max(4px, env(safe-area-inset-left));
      }
      #touch-right {
        order: 3;
        padding-right: max(4px, env(safe-area-inset-right));
      }
      .touch-side {
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        padding: 4px;
      }
      .dpad { grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(3, 44px); gap: 3px; }
      .dpad-btn { width: 44px; height: 44px; font-size: 18px; }
      .action-btn { width: 48px; height: 48px; font-size: 14px; }
      .small-btn { height: 28px; padding: 0 10px; font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="game-layout">
    <div id="canvas-wrapper">
      <div id="canvas-container">
        <div id="loading">
          <div id="status">Loading...</div>
          <progress id="progress" value="0" max="100"></progress>
        </div>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
      </div>
    </div>
    <div id="touch-portrait-row">
      <div id="touch-left" class="touch-side">
        <div class="dpad">
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowUp" data-code="ArrowUp">&#9650;</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowLeft" data-code="ArrowLeft">&#9664;</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowRight" data-code="ArrowRight">&#9654;</button>
          <div class="dpad-blank"></div>
          <button class="dpad-btn" data-key="ArrowDown" data-code="ArrowDown">&#9660;</button>
          <div class="dpad-blank"></div>
        </div>
      </div>
      <div id="touch-right" class="touch-side">
        <div class="action-buttons">
          <div class="action-row">
            <button class="action-btn btn-b" data-key="x" data-code="KeyX">B</button>
            <button class="action-btn btn-a" data-key="z" data-code="KeyZ">A</button>
          </div>
          <div class="small-buttons">
            <button class="small-btn" data-key="Shift" data-code="ShiftLeft">Run</button>
            <button class="small-btn" data-key="c" data-code="KeyC">Menu</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="fs-toggle" type="button" aria-label="Toggle fullscreen">
    <svg id="fs-icon-expand" viewBox="0 0 24 24"><path d="M3 3h6v2H5v4H3V3zm12 0h6v6h-2V5h-4V3zM3 15h2v4h4v2H3v-6zm16 4h-4v2h6v-6h-2v4z"/></svg>
    <svg id="fs-icon-shrink" style="display:none" viewBox="0 0 24 24"><path d="M9 3v4H5v2h6V3H9zm6 0v6h6V7h-4V3h-2zM5 15h4v6h2v-8H5v2zm10 0v6h2v-4h4v-2h-6z"/></svg>
  </button>

  <div id="audio-unlock">
    <button id="audio-unlock-btn" type="button">Tap to enable audio</button>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════
     *  DOM REFERENCES
     * ═══════════════════════════════════════════════════════════ */
    var statusElement    = document.getElementById('status');
    var progressElement  = document.getElementById('progress');
    var loadingElement   = document.getElementById('loading');
    var canvasElement    = document.getElementById('canvas');
    var containerElement = document.getElementById('canvas-container');
    var wrapperElement   = document.getElementById('canvas-wrapper');
    var audioUnlockOverlay = document.getElementById('audio-unlock');
    var audioUnlockButton  = document.getElementById('audio-unlock-btn');

    window.ASSET_BASE = window.ASSET_BASE || '';

    /* ═══════════════════════════════════════════════════════════
     *  WEBGL CONTEXT LOSS
     *  Supported: all WebGL-capable browsers.
     * ═══════════════════════════════════════════════════════════ */
    canvasElement.addEventListener('webglcontextlost', function(e) {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    /* ═══════════════════════════════════════════════════════════
     *  FULLSCREEN TOGGLE
     *
     *  Fullscreen API support:
     *    Chrome Android ≥69:  ✓ (standard)
     *    Firefox Android ≥64: ✓ (standard)
     *    Samsung Internet:    ✓ (standard)
     *    Safari macOS ≥16.4:  ✓ (webkitRequestFullscreen)
     *    iOS Safari:          ✗ (no support, we hide the button)
     *
     *  We detect iOS/iPadOS and hide the button since the
     *  Fullscreen API is not supported there.
     * ═══════════════════════════════════════════════════════════ */
    (function() {
      var fsBtn     = document.getElementById('fs-toggle');
      var iconExp   = document.getElementById('fs-icon-expand');
      var iconShrink = document.getElementById('fs-icon-shrink');
      var docEl     = document.documentElement;

      // Feature detect
      var hasFS = !!(docEl.requestFullscreen || docEl.webkitRequestFullscreen);

      // iOS/iPadOS detection: Safari on iOS reports webkitRequestFullscreen
      // but it is a no-op. Detect by UA string or iPad pretending to be Mac.
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

      if (!hasFS || isIOS) {
        fsBtn.style.display = 'none';
        return;
      }

      function isFS() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement);
      }

      function updateIcon() {
        var fs = isFS();
        iconExp.style.display    = fs ? 'none' : '';
        iconShrink.style.display = fs ? ''     : 'none';
      }

      fsBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isFS()) {
          if (document.exitFullscreen)        document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        } else {
          if (docEl.requestFullscreen)        docEl.requestFullscreen();
          else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
        }
      });

      document.addEventListener('fullscreenchange', updateIcon);
      document.addEventListener('webkitfullscreenchange', updateIcon);
      // Poll as safety net for browsers where Escape exits fullscreen
      // before JS event fires. Cost: ~0.001% CPU.
      setInterval(updateIcon, 500);
    })();

    /* ═══════════════════════════════════════════════════════════
     *  EMSCRIPTEN MODULE CONFIGURATION
     * ═══════════════════════════════════════════════════════════ */
    var setStatus = function(text) {
      if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
      if (text === setStatus.last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - setStatus.last.time < 30) return;
      setStatus.last.time = now;
      setStatus.last.text = text;
      if (m) {
        statusElement.textContent = m[1];
        progressElement.value = parseInt(m[2]) * 100;
        progressElement.max   = parseInt(m[4]) * 100;
      } else {
        if (!text) loadingElement.classList.add('hidden');
        statusElement.textContent = text;
      }
    };

    var Module = {
      locateFile: function(path, prefix) {
        if (path.endsWith('.data')) {
          var base = window.ASSET_BASE || '';
          if (base && !base.endsWith('/')) base += '/';
          return base + path;
        }
        return prefix + path;
      },

      print: function() {
        console.log.apply(console, arguments);
      },
      printErr: function() {
        console.warn.apply(console, arguments);
      },
      canvas: canvasElement,
      setStatus: setStatus,
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      preRun: [function() {
        /* Mount IDBFS on /saves for persistent save data.
        * IDBFS uses IndexedDB — supported on:
        *   iOS Safari ≥10, Chrome Android ≥24, Firefox Android ≥16,
        *   Samsung Internet ≥4, Safari macOS ≥10.1
        * We block game start until existing saves are loaded. */
        FS.mkdir('/saves');
        FS.mount(IDBFS, {}, '/saves');
        Module.addRunDependency('idbfs-load');
        FS.syncfs(true, function(err) {
          if (err) console.warn('IDBFS load error:', err);
          Module.removeRunDependency('idbfs-load');
        });
      }]
    };

    /* ═══════════════════════════════════════════════════════════
     *  SAVE PERSISTENCE (periodic IDBFS sync)
     *
     *  Game writes to /saves/slot_N.sav on MEMFS.
     *  We flush MEMFS → IndexedDB periodically + on page hide.
     *
     *  pagehide is the reliable event on iOS Safari for
     *  catching tab close / app switch. beforeunload works on
     *  Chrome/Firefox desktop and Android.
     * ═══════════════════════════════════════════════════════════ */
    (function() {
      var syncing = false;
      function syncSaves() {
        if (syncing) return;
        if (typeof FS === 'undefined' || typeof FS.syncfs !== 'function') return;
        syncing = true;
        FS.syncfs(false, function(err) {
          syncing = false;
          if (err) console.warn('IDBFS sync error:', err);
        });
      }
      setInterval(syncSaves, 2000);
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') syncSaves();
      });
      window.addEventListener('beforeunload', syncSaves);
      window.addEventListener('pagehide', syncSaves);
    })();

    setStatus('Downloading...');
    window.onerror = function() {
      setStatus('Exception thrown, see JavaScript console');
      setStatus = function(text) {
        if (text) console.error('[post-exception status] ' + text);
      };
    };

    /* ═══════════════════════════════════════════════════════════
     *  AUDIO UNLOCK — iOS / Android / Desktop
     *
     *  Three problems on iOS Safari:
     *
     *  1. Emscripten SDL2 bug: When navigator.userActivation
     *     exists (all modern browsers), autoResumeAudioContext
     *     is SKIPPED, and the fallback setInterval calls
     *     .resume() outside a user gesture — iOS ignores this.
     *
     *  2. autoResumeAudioContext listens on 'touchstart', but
     *     per WebKit docs touchstart is NOT a user activation
     *     event on Safari.
     *
     *  3. iOS mute switch: Web Audio respects the mute/ringer
     *     switch by default. AudioContext reports 'running' and
     *     data flows normally, but output is silenced. Playing
     *     an HTML <audio> element from a user gesture switches
     *     the iOS audio session from "ambient" (respects mute)
     *     to "playback" (ignores mute) — like YouTube does.
     *
     *  Fix:
     *  1. ES6 Proxy intercepts AudioContext construction to
     *     track all contexts (Chrome team's recommendation).
     *  2. Event listeners on ONLY real activation events (NOT
     *     touchstart) call .resume() on every interaction.
     *  3. Playing a silent WAV via <audio> from the first user
     *     gesture switches iOS audio session to "playback" mode.
     *
     *  Sources:
     *    Chrome: developer.chrome.com/blog/web-audio-autoplay
     *    WebKit: webkit.org/blog/13862/ (activation events)
     *
     *  Compatibility:
     *    iOS Safari ≥10:    ✓ (Proxy + touchend + <audio> trick)
     *    Chrome Android:    ✓ (click/pointerup gesture)
     *    Firefox Android:   ✓ (click gesture)
     *    Samsung Internet:  ✓ (click/touchend gesture)
     *    Desktop browsers:  ✓ (click/keydown gesture)
     * ═══════════════════════════════════════════════════════════ */
    (function() {
      var allCtx = [];
      var unlocked = false;
      var audioSessionUnlocked = false;

      /* ── 1. Proxy-based AudioContext interception ──
       * ES6 Proxy with construct trap — transparent interception
       * that preserves instanceof, static properties, prototype.
       */
      function proxyAC(name) {
        var Orig = window[name];
        if (!Orig || typeof Proxy === 'undefined') return;
        window[name] = new Proxy(Orig, {
          construct: function(target, args) {
            var ctx = new (Function.prototype.bind.apply(target, [null].concat(args)))();
            allCtx.push(ctx);
            return ctx;
          }
        });
      }
      proxyAC('AudioContext');
      proxyAC('webkitAudioContext');

      /* ── 2. Generate a silent WAV blob URL (once) ──
       * Playing an HTML <audio> element from a user gesture
       * switches iOS from "ambient" audio session (muted by
       * silent switch) to "playback" session (ignores switch).
       * This is the same technique YouTube uses.
       *
       * CRITICAL: The <audio> element must keep playing
       * (looping) for the entire session. If it stops/pauses,
       * iOS reverts to "ambient" and the mute switch takes
       * effect again.
       */
      var silentWavUrl = null;
      function getSilentWavUrl() {
        if (silentWavUrl) return silentWavUrl;
        // 1 second of silence — long enough for smooth looping
        var sr = 44100, ns = 44100;
        var ds = ns * 2;
        var buf = new ArrayBuffer(44 + ds);
        var v = new DataView(buf);
        function w(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
        w(0,'RIFF'); v.setUint32(4, 36+ds, true); w(8,'WAVE');
        w(12,'fmt '); v.setUint32(16, 16, true);
        v.setUint16(20, 1, true); v.setUint16(22, 1, true);
        v.setUint32(24, sr, true); v.setUint32(28, sr*2, true);
        v.setUint16(32, 2, true); v.setUint16(34, 16, true);
        w(36,'data'); v.setUint32(40, ds, true);
        silentWavUrl = URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
        return silentWavUrl;
      }

      /* ── 3. Unlock iOS audio session ──
       * Plays a looping silent WAV via <audio> to permanently
       * switch the audio session to "playback" mode. The element
       * keeps playing silently for the entire page lifetime so
       * iOS never reverts to "ambient" (mute-respecting) mode.
       */
      var keepAliveAudio = null;
      function unlockAudioSession() {
        if (audioSessionUnlocked) return;
        try {
          keepAliveAudio = new Audio(getSilentWavUrl());
          keepAliveAudio.setAttribute('playsinline', '');
          keepAliveAudio.loop = true;
          var p = keepAliveAudio.play();
          if (p) p.then(function() {
            audioSessionUnlocked = true;
          }).catch(function() {
            keepAliveAudio = null;
          });
        } catch(e) { keepAliveAudio = null; }
      }

      /* ── 4. Resume ALL known AudioContexts ──
       * Called from every user activation event. Also triggers
       * the audio session unlock on iOS.
       */
      function resumeAll() {
        unlockAudioSession();

        // Pick up SDL2's context if created before our Proxy
        try {
          var sdlCtx = Module && Module.SDL2 && Module.SDL2.audioContext;
          if (sdlCtx && allCtx.indexOf(sdlCtx) === -1) allCtx.push(sdlCtx);
        } catch(e) {}

        for (var i = 0; i < allCtx.length; i++) {
          try {
            var ctx = allCtx[i];
            if (ctx.state === 'suspended') {
              ctx.resume();
              // Silent buffer primes iOS audio hardware
              var buf = ctx.createBuffer(1, 1, ctx.sampleRate || 44100);
              var src = ctx.createBufferSource();
              src.buffer = buf;
              src.connect(ctx.destination);
              src.start(0);
            }
          } catch(e) {}
        }

        if (!unlocked) {
          unlocked = true;
          audioUnlockOverlay.classList.add('hidden');
        }
      }

      /* ── 5. Activation-event listeners ──
       * ONLY real user activation events (NOT touchstart).
       * Per WebKit: touchend, mousedown, pointerdown (mouse),
       *   pointerup (non-mouse), keydown (except Escape)
       * Per Chrome: also click, contextmenu, auxclick, dblclick,
       *   mouseup, keyup
       *
       * Capture phase, passive, permanent (not { once }).
       */
      ['touchend','mousedown','mouseup','pointerup','click',
       'dblclick','contextmenu','auxclick','keydown','keyup'
      ].forEach(function(evt) {
        document.addEventListener(evt, resumeAll, { capture: true, passive: true });
      });

      /* ── 6. Overlay button ──
       * Pre-creates AudioContext during user gesture and stores
       * on Module.SDL2.audioContext so SDL reuses it.
       */
      function onOverlayGesture(e) {
        if (e.preventDefault) e.preventDefault();
        unlockAudioSession();
        try {
          if (typeof Module !== 'undefined') {
            if (!Module.SDL2) Module.SDL2 = {};
            if (!Module.SDL2.audioContext) {
              Module.SDL2.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
          }
        } catch(ex) {}
        resumeAll();
      }
      audioUnlockButton.addEventListener('touchend', onOverlayGesture, { passive: false });
      audioUnlockButton.addEventListener('click', onOverlayGesture);

      /* ── 7. Expose for touch controls ── */
      window.tryUnlockGameAudio = resumeAll;

      /* ── 8. Poll for overlay visibility ── */
      var pollCount = 0;
      var pollTimer = setInterval(function() {
        try {
          var ctx = Module && Module.SDL2 && Module.SDL2.audioContext;
          if (ctx) {
            if (allCtx.indexOf(ctx) === -1) allCtx.push(ctx);
            if (ctx.state === 'running') audioUnlockOverlay.classList.add('hidden');
          }
        } catch(e) {}
        if (++pollCount > 240) clearInterval(pollTimer);
      }, 250);

      /* ── 9. Re-resume on visibility change ──
       * iOS suspends AudioContext when backgrounded.
       */
      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible' && unlocked) resumeAll();
      });
    })();

    /* ═══════════════════════════════════════════════════════════
     *  TOUCH CONTROLS → KEYBOARD EVENTS
     *
     *  Uses Touch Events API (not Pointer Events) because:
     *  - Multi-touch: Touch.identifier tracks individual fingers,
     *    needed for pressing D-pad + action simultaneously.
     *  - iOS Safari: full Touch Events support since v3.2.
     *  - Android Chrome: full support since v18.
     *  - Firefox Android: full support since v52.
     *
     *  Hit testing uses getBoundingClientRect() instead of
     *  elementFromPoint() because the latter doesn't work
     *  correctly during touchmove on iOS (the touch target
     *  element captures the gesture).
     *
     *  trackedTouches{}: Tracks all touch IDs that started on
     *  our control area. This ensures sliding off a button gap
     *  and back onto another button re-activates it.
     * ═══════════════════════════════════════════════════════════ */
    (function() {
      var touchRoot = document.getElementById('touch-portrait-row');
      var allBtns = Array.prototype.slice.call(
        document.querySelectorAll('.touch-side [data-key]')
      );
      var activeMap = {};       // touchId → currently pressed button
      var trackedTouches = {};  // touchId → true

      var KEY_CODES = {
        'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39,
        'z': 90, 'x': 88, 'c': 67, 'Shift': 16
      };

      function sendKey(type, key, code) {
        canvasElement.dispatchEvent(new KeyboardEvent(type, {
          key: key, code: code,
          keyCode: KEY_CODES[key] || 0,
          which:   KEY_CODES[key] || 0,
          bubbles: true, cancelable: true
        }));
      }

      function pressButton(touchId, btn) {
        var cur = activeMap[touchId] || null;
        if (cur === btn) return;
        if (cur) {
          cur.classList.remove('pressed');
          sendKey('keyup', cur.dataset.key, cur.dataset.code);
        }
        if (btn) {
          activeMap[touchId] = btn;
          btn.classList.add('pressed');
          sendKey('keydown', btn.dataset.key, btn.dataset.code);
        } else {
          delete activeMap[touchId];
        }
      }

      function btnAtPoint(x, y) {
        for (var i = 0; i < allBtns.length; i++) {
          var r = allBtns[i].getBoundingClientRect();
          if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) {
            return allBtns[i];
          }
        }
        return null;
      }

      function onStart(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          trackedTouches[t.identifier] = true;
          pressButton(t.identifier, btnAtPoint(t.clientX, t.clientY));
        }
      }

      function onMove(e) {
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var t = e.changedTouches[i];
          if (t.identifier in trackedTouches) {
            pressButton(t.identifier, btnAtPoint(t.clientX, t.clientY));
          }
        }
      }

      function onEnd(e) {
        // Resume audio on touchend — touchend IS a user activation
        // event on Safari (unlike touchstart which is NOT).
        if (window.tryUnlockGameAudio) window.tryUnlockGameAudio();
        e.preventDefault();
        for (var i = 0; i < e.changedTouches.length; i++) {
          var id = e.changedTouches[i].identifier;
          pressButton(id, null);
          delete trackedTouches[id];
        }
      }

      function onCancel(e) {
        for (var i = 0; i < e.changedTouches.length; i++) {
          var id = e.changedTouches[i].identifier;
          pressButton(id, null);
          delete trackedTouches[id];
        }
      }

      touchRoot.addEventListener('touchstart',  onStart,  { passive: false });
      touchRoot.addEventListener('touchmove',   onMove,   { passive: false });
      touchRoot.addEventListener('touchend',    onEnd,    { passive: false });
      touchRoot.addEventListener('touchcancel', onCancel, { passive: false });
      touchRoot.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    })();

    /* ═══════════════════════════════════════════════════════════
     *  RESPONSIVE CANVAS SCALING
     *
     *  CSS transform: scale() on the container, keeping the
     *  actual canvas buffer at 1024×768. This prevents
     *  Emscripten from resizing the WebGL framebuffer.
     *
     *  viewport sizing:
     *    Modern (iOS ≥13, Chrome ≥61, FF ≥91):
     *      window.visualViewport.width/height — most accurate,
     *      accounts for mobile browser toolbar show/hide.
     *    Fallback: window.innerWidth/Height
     * ═══════════════════════════════════════════════════════════ */
    (function() {
      var NW = 1024, NH = 768, PIXEL_SCALE = 4;

      function getVP() {
        if (window.visualViewport) {
          return { w: window.visualViewport.width, h: window.visualViewport.height };
        }
        return { w: window.innerWidth, h: window.innerHeight };
      }

      function applyScale() {
        if (canvasElement.width < 2 || canvasElement.height < 2) return;

        var vp = getVP();
        var ws = window.getComputedStyle(wrapperElement);
        var bx = (parseFloat(ws.borderLeftWidth) || 0) + (parseFloat(ws.borderRightWidth) || 0);
        var by = (parseFloat(ws.borderTopWidth)  || 0) + (parseFloat(ws.borderBottomWidth) || 0);

        var isLand = (vp.w > vp.h) && vp.h <= 500;
        var isPort = vp.w <= 768 && !isLand;
        var scale;

        if (isLand) {
          var side = 148 + 124 + 8; // d-pad + actions + gaps
          scale = Math.min((vp.w - side - bx) / NW, (vp.h - 8 - by) / NH);
        } else if (isPort) {
          var ctrlH = 180;
          scale = Math.min((vp.w - 16 - bx) / NW, (vp.h - ctrlH - by - 16) / NH);
        } else {
          // Desktop: integer-step for crisp pixels
          var maxW = Math.min(NW * 2, vp.w * 0.9);
          var maxH = vp.h * 0.85 - 50;
          var step = NW / PIXEL_SCALE;
          var n = Math.floor(maxW / step);
          if (n < 1) n = 1;
          scale = n / PIXEL_SCALE;
          while (NH * scale > maxH && scale > 1 / PIXEL_SCALE) {
            n--;
            scale = Math.max(n, 1) / PIXEL_SCALE;
          }
        }

        scale = Math.max(scale, 0.1);
        containerElement.style.transform = 'scale(' + scale + ')';
        wrapperElement.style.width  = Math.floor(NW * scale + bx) + 'px';
        wrapperElement.style.height = Math.floor(NH * scale + by) + 'px';
      }

      window.addEventListener('resize', applyScale);

      // visualViewport.resize: fires when iOS toolbar appears/disappears.
      // More reliable than window.resize on mobile Safari.
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyScale);
      }

      // orientationchange: additional safety for mobile rotation.
      // Some browsers fire resize before layout settles.
      window.addEventListener('orientationchange', function() {
        applyScale();
        setTimeout(applyScale, 100);
        setTimeout(applyScale, 300);
      });

      // Poll until Emscripten initializes the canvas
      var n = 0;
      (function poll() {
        if (canvasElement.width >= 2 && canvasElement.height >= 2) {
          applyScale();
          if (++n < 10) setTimeout(poll, 100);
        } else {
          requestAnimationFrame(poll);
        }
      })();
    })();

    /* ═══════════════════════════════════════════════════════════
     *  PREVENT iOS RUBBER-BAND BOUNCE / PULL-TO-REFRESH
     *
     *  Even with overflow:hidden + touch-action:none on body,
     *  some iOS versions allow scrolling on the <html> element.
     *  This catches and prevents it for any touch not already
     *  handled by the touch controls.
     *
     *  passive: false is required to call preventDefault().
     * ═══════════════════════════════════════════════════════════ */
    document.addEventListener('touchmove', function(e) {
      // Don't double-prevent on touch controls (they already do it)
      var tgt = e.target;
      if (tgt && tgt.closest && tgt.closest('#touch-portrait-row')) return;
      e.preventDefault();
    }, { passive: false });

  </script>
