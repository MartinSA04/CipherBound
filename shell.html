<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéGame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
    }

    #canvas-container {
      position: relative;
      border: 3px solid #444;
      border-radius: 6px;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Fullscreen: black background, canvas centered */
    #canvas-container:fullscreen {
      width: 100vw;
      height: 100vh;
      border: none;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #controls {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background: #2d2d4e;
      color: #e0e0e0;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s;
    }
    button:hover { background: #3d3d6e; }

    #loading {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 10;
    }

    #loading.hidden { display: none; }

    #status {
      margin-bottom: 12px;
      font-size: 16px;
    }

    progress {
      width: 240px;
      height: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    progress::-webkit-progress-bar { background: #333; border-radius: 6px; }
    progress::-webkit-progress-value { background: #5b7fff; border-radius: 6px; }
    progress::-moz-progress-bar { background: #5b7fff; border-radius: 6px; }
  </style>
</head>
<body>
  <div id="canvas-container">
    <div id="loading">
      <div id="status">Loading...</div>
      <progress id="progress" value="0" max="100"></progress>
    </div>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
  </div>

  <div id="controls">
    <button id="fullscreen-btn">Fullscreen</button>
  </div>

  <script>
    var statusElement = document.getElementById('status');
    var progressElement = document.getElementById('progress');
    var loadingElement = document.getElementById('loading');
    var canvasElement = document.getElementById('canvas');
    var containerElement = document.getElementById('canvas-container');

    canvasElement.addEventListener('webglcontextlost', function(e) {
      alert('WebGL context lost. You will need to reload the page.');
      e.preventDefault();
    }, false);

    document.getElementById('fullscreen-btn').addEventListener('click', function() {
      if (containerElement.requestFullscreen) containerElement.requestFullscreen();
      else if (containerElement.webkitRequestFullscreen) containerElement.webkitRequestFullscreen();
    });

    var setStatus = function(text) {
      if (!setStatus.last) setStatus.last = { time: Date.now(), text: '' };
      if (text === setStatus.last.text) return;
      var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
      var now = Date.now();
      if (m && now - setStatus.last.time < 30) return;
      setStatus.last.time = now;
      setStatus.last.text = text;
      if (m) {
        statusElement.textContent = m[1];
        progressElement.value = parseInt(m[2]) * 100;
        progressElement.max = parseInt(m[4]) * 100;
      } else {
        if (!text) {
          loadingElement.classList.add('hidden');
        }
        statusElement.textContent = text;
      }
    };

    var Module = {
      print: function() {
        var args = Array.prototype.slice.call(arguments);
        console.log.apply(console, args);
      },
      printErr: function() {
        var args = Array.prototype.slice.call(arguments);
        console.warn.apply(console, args);
      },
      canvas: canvasElement,
      setStatus: setStatus,
      totalDependencies: 0,
      monitorRunDependencies: function(left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      }
    };

    setStatus('Downloading...');
    window.onerror = function(event) {
      setStatus('Exception thrown, see JavaScript console');
      setStatus = function(text) {
        if (text) console.error('[post-exception status] ' + text);
      };
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
